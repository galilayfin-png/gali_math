<title>אלכס מלמד כפל</title>
<style>
  :root{
    --plum:#5b3a8c; --plum-deep:#3d245f; --cream:#fdf6ec;
    --mint:#3ec9a7; --coral:#ff6f91; --sun:#ffc94d; --ink:#2b2440;
    --good:#2bb673; --bad:#ff5d6c;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    font-family:'Heebo','Segoe UI',system-ui,sans-serif;
    background:radial-gradient(circle at 30% 0%,#6b46a8 0%,var(--plum-deep) 60%,#2a1947 100%);
    color:var(--ink); overflow:hidden; user-select:none;
  }
  #app{height:100dvh;display:flex;flex-direction:column;max-width:520px;margin:0 auto;position:relative;}
  .screen{flex:1;display:none;flex-direction:column;padding:18px;animation:fade .35s ease;}
  .screen.on{display:flex;}
  @keyframes fade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}

  /* ---- HOME ---- */
  .home-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;text-align:center;}
  .cat-hero{width:160px;height:160px;border-radius:50%;object-fit:cover;border:6px solid var(--sun);box-shadow:0 12px 40px rgba(0,0,0,.45);}
  .title{color:#fff;font-size:2.1rem;font-weight:800;line-height:1.15;text-shadow:0 3px 0 rgba(0,0,0,.15);}
  .title small{display:block;font-size:1rem;font-weight:500;color:var(--sun);margin-top:6px;}
  .big-btn{
    background:linear-gradient(180deg,var(--mint),#28a98a);color:#04332a;border:none;
    font-family:inherit;font-weight:800;font-size:1.4rem;padding:18px 46px;border-radius:22px;
    box-shadow:0 8px 0 #1c7c64,0 14px 24px rgba(0,0,0,.3);cursor:pointer;transition:transform .08s;
  }
  .big-btn:active{transform:translateY(4px);box-shadow:0 4px 0 #1c7c64;}
  .mini-stats{display:flex;gap:14px;color:#fff;font-size:.95rem;flex-wrap:wrap;justify-content:center;}
  .chip{background:rgba(255,255,255,.14);padding:8px 16px;border-radius:14px;font-weight:600;backdrop-filter:blur(4px);}

  /* ---- QUIZ ---- */
  .topbar{display:flex;align-items:center;gap:10px;color:#fff;font-weight:700;}
  .topbar .home-x{margin-inline-start:auto;background:rgba(255,255,255,.15);border:none;color:#fff;width:40px;height:40px;border-radius:50%;font-size:1.3rem;cursor:pointer;}
  .progbar{height:12px;background:rgba(255,255,255,.18);border-radius:8px;overflow:hidden;margin-top:10px;}
  .progfill{height:100%;width:0;background:linear-gradient(90deg,var(--sun),var(--coral));transition:width .4s;}
  .streakline{display:flex;align-items:center;justify-content:center;gap:6px;color:var(--sun);font-weight:800;height:26px;margin-top:6px;font-size:1rem;}

  .qcard{
    background:var(--cream);border-radius:26px;margin-top:16px;padding:22px 18px;flex:1;
    display:flex;flex-direction:column;box-shadow:0 14px 40px rgba(0,0,0,.35);overflow:hidden;
  }
  .qtype{font-weight:700;color:var(--plum);font-size:.95rem;text-align:center;opacity:.8;}
  .qbody{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:14px;}
  .qnum{font-size:3.4rem;font-weight:800;color:var(--ink);direction:ltr;letter-spacing:2px;}
  .qword{font-size:1.45rem;font-weight:600;line-height:1.5;color:var(--ink);}
  .qword b{color:var(--plum);}
  .dots{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;max-width:300px;}
  .dot{width:13px;height:13px;border-radius:50%;background:var(--coral);opacity:.85;}
  .dotgroup{display:flex;gap:4px;padding:5px;border:2px dashed var(--plum);border-radius:10px;}

  .answers{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px;}
  .ans{
    background:#fff;border:3px solid var(--plum);color:var(--plum);font-family:inherit;
    font-weight:800;font-size:1.8rem;padding:18px;border-radius:18px;cursor:pointer;direction:ltr;
    box-shadow:0 4px 0 var(--plum);transition:transform .07s;
  }
  .ans:active{transform:translateY(3px);box-shadow:0 1px 0 var(--plum);}
  .ans.right{background:var(--good);border-color:#178a52;color:#fff;box-shadow:0 4px 0 #178a52;}
  .ans.wrong{background:var(--bad);border-color:#c43b48;color:#fff;box-shadow:0 4px 0 #c43b48;animation:shake .4s;}
  @keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-7px);}75%{transform:translateX(7px);}}

  /* ---- REWARD POP ---- */
  .pop{position:absolute;inset:0;display:none;align-items:center;justify-content:center;
    background:rgba(20,10,40,.78);z-index:30;animation:fade .3s;padding:20px;}
  .pop.on{display:flex;}
  .pop-card{background:var(--cream);border-radius:28px;padding:20px;text-align:center;max-width:340px;width:100%;
    box-shadow:0 20px 60px rgba(0,0,0,.5);}
  .pop-card img{width:100%;max-height:320px;object-fit:cover;border-radius:18px;border:5px solid var(--sun);}
  .pop-msg{font-size:1.4rem;font-weight:800;color:var(--plum);margin:14px 0;}
  .pop-btn{background:var(--coral);color:#fff;border:none;font-family:inherit;font-weight:800;
    font-size:1.2rem;padding:14px 34px;border-radius:18px;cursor:pointer;box-shadow:0 5px 0 #d24a68;}
  .pop-btn:active{transform:translateY(3px);box-shadow:0 2px 0 #d24a68;}

  /* ---- DONE ---- */
  .done-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;text-align:center;color:#fff;}
  .done-cat{width:200px;height:200px;border-radius:24px;object-fit:cover;border:5px solid var(--sun);box-shadow:0 12px 40px rgba(0,0,0,.45);}
  .score-big{font-size:3rem;font-weight:800;color:var(--sun);}
  .confetti{position:absolute;top:-10px;width:10px;height:16px;border-radius:2px;animation:fall linear forwards;z-index:25;}
  @keyframes fall{to{transform:translateY(110vh) rotate(540deg);opacity:.3;}}

  .footnote{text-align:center;color:rgba(255,255,255,.5);font-size:.75rem;padding:6px;}
</style>
</head>

const KID = "גלי"; // cat name used in word problems

// ---------- persistent adaptive memory ----------
const STORE_KEY = "galiMathV1";
function loadStore(){
  try{const s=JSON.parse(localStorage.getItem(STORE_KEY));if(s)return s;}catch(e){}
  return {facts:{}, totalCorrect:0, totalSeen:0, rounds:0, bestStreak:0};
}
function saveStore(){localStorage.setItem(STORE_KEY,JSON.stringify(STORE));}
let STORE = loadStore();

// weight = how much a fact needs practice. higher = ask more.
function factKey(a,b){return a+"x"+b;}
function getWeight(a,b){
  const f = STORE.facts[factKey(a,b)];
  if(!f) return 3;                         // unseen → medium-high priority
  let w = 1 + f.wrong*4 - f.right*0.6;     // wrong answers raise it a lot
  // hard facts (big numbers) get a small natural bump
  w += (a>=6&&b>=6)?0.8:0;
  return Math.max(0.4, w);
}
function recordFact(a,b,correct){
  const k=factKey(a,b);
  const f=STORE.facts[k]||{right:0,wrong:0};
  if(correct)f.right++; else f.wrong++;
  STORE.facts[k]=f;
}

// difficulty band grows with mastery
function maxFactor(){
  const acc = STORE.totalSeen? STORE.totalCorrect/STORE.totalSeen : 0;
  const mastered = Object.values(STORE.facts).filter(f=>f.right>=2&&f.right>=f.wrong).length;
  if(STORE.totalSeen<8) return 5;          // gentle start
  if(mastered<15||acc<0.6) return 6;
  if(mastered<30||acc<0.75) return 8;
  return 10;                               // full table
}

// ---------- question generation ----------
function weightedPick(maxF){
  const pool=[];
  for(let a=1;a<=maxF;a++)for(let b=1;b<=maxF;b++){
    pool.push({a,b,w:getWeight(a,b)});
  }
  const total=pool.reduce((s,p)=>s+p.w,0);
  let r=Math.random()*total;
  for(const p of pool){r-=p.w;if(r<=0)return p;}
  return pool[pool.length-1];
}
function makeOptions(ans,maxF){
  const set=new Set([ans]);
  const span=Math.max(6,maxF*2);
  let guard=0;
  while(set.size<4 && guard++<60){
    let d=ans+(Math.floor(Math.random()*span)-Math.floor(span/2));
    if(d>0 && d!==ans) set.add(d);
  }
  while(set.size<4){set.add(ans+set.size);}
  return [...set].sort(()=>Math.random()-0.5);
}

}

function nextQuestion(){
  if(idx>=ROUND_LEN){return finishRound();}
  locked=false;
  const maxF=maxFactor();
  const pick=weightedPick(maxF);
  const a=pick.a, b=pick.b, ans=a*b;
  // ~40% word problems, but never on factor 1 (too trivial in words)
  const isWord = Math.random()<0.4 && a>1 && b>1;
  current={a,b,ans,isWord};

  document.getElementById('qcount').textContent=`שאלה ${idx+1} מתוך ${ROUND_LEN}`;
  document.getElementById('progfill').style.width=(idx/ROUND_LEN*100)+'%';
  renderStreak();

  const qtype=document.getElementById('qtype');
  const qbody=document.getElementById('qbody');
  if(isWord){
    qtype.textContent="🧠 חידת מילים";
    const tpl=WORD_TEMPLATES[Math.floor(Math.random()*WORD_TEMPLATES.length)];
    qbody.innerHTML=`<div class="qword">${tpl(a,b)}</div>`;
  }else{
    qtype.textContent="✖️ תרגיל";
    let dots='';
    // visual dot array only for smaller products to aid understanding
    if(a<=6&&b<=6){
      let groups='';
      for(let i=0;i<a;i++){
        let g='';for(let j=0;j<b;j++)g+='<div class="dot"></div>';
        groups+=`<div class="dotgroup">${g}</div>`;
      }
      dots=`<div class="dots">${groups}</div>`;
    }
    qbody.innerHTML=`<div class="qnum">${a} × ${b}</div>${dots}`;
  }

  const opts=makeOptions(ans,maxF);
  const wrap=document.getElementById('answers');
  wrap.innerHTML='';
  opts.forEach(o=>{
    const btn=document.createElement('button');
    btn.className='ans';btn.textContent=o;
    btn.onclick=()=>answer(btn,o);
    wrap.appendChild(btn);
  });
}

function renderStreak(){
  const el=document.getElementById('streakline');
  el.textContent = streak>=2 ? `🔥 רצף של ${streak}!` : '';
}

function answer(btn,val){
  if(locked)return; locked=true;
  const {a,b,ans}=current;
  const correct = val===ans;
  STORE.totalSeen++;
  recordFact(a,b,correct);

  if(correct){
    btn.classList.add('right');
    score++; STORE.totalCorrect++; streak++;
    if(streak>STORE.bestStreak)STORE.bestStreak=streak;
    beep(true);
    saveStore();
    // reward photo every 3-in-a-row
    if(streak>0 && streak%3===0){
      setTimeout(()=>showReward(),450);
    }else{
      setTimeout(()=>{idx++;nextQuestion();},650);
    }
  }else{
    btn.classList.add('wrong');
    streak=0; beep(false);
    // reveal the correct one
    [...document.querySelectorAll('.ans')].forEach(x=>{
      if(parseInt(x.textContent)===ans)x.classList.add('right');
    });
    saveStore();
    setTimeout(()=>{idx++;nextQuestion();},1500);
  }
}

// ---------- rewards ----------
const PRAISE=["איזה יופי! גלי גאה בך 🐱","מצוין! גלי מרדדת 😻","וואו, אלופה! 🌟","נכון מאוד! גלי שמחה 💜","פצצה! ממשיכים 🚀"];
function showReward(){
  const img=CAT_IMAGES[Math.floor(Math.random()*CAT_IMAGES.length)];
  document.getElementById('popImg').src=img;
  document.getElementById('popMsg').textContent=PRAISE[Math.floor(Math.random()*PRAISE.length)];
  document.getElementById('pop').classList.add('on');
  meow();
}
function closePop(){
  document.getElementById('pop').classList.remove('on');
  idx++; nextQuestion();
}

function finishRound(){
  STORE.rounds++; saveStore();
  document.getElementById('progfill').style.width='100%';
  const img=CAT_IMAGES[Math.floor(Math.random()*CAT_IMAGES.length)];
  document.getElementById('doneImg').src=img;
  document.getElementById('doneScore').textContent=`${score} / ${ROUND_LEN}`;
  let msg;
  if(score===ROUND_LEN)msg="כל התשובות נכונות! גלי ממש גאה בך 🏆";
  else if(score>=7)msg="עבודה מצוינת! עוד קצת תרגול ואת אלופת הכפל 💪";
  else msg="כל הכבוד על המאמץ! בכל סבב את משתפרת. גלי מאמינה בך 💜";
  document.getElementById('doneMsg').textContent=msg;
  show('done');
  confettiBurst();
  setTimeout(meow,300);
}

// ---------- sound ----------
let actx;
let meowBuffer=null;     // decoded meow audio
let audioReady=false;

function ensureCtx(){
  if(!actx){
    try{actx=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}
  }
  return actx;
}

// unlock + decode on the first user interaction (mobile requirement)
function b64ToArrayBuffer(dataUri){
  const b64 = dataUri.split(',')[1];
  const bin = atob(b64);
  const len = bin.length;
  const bytes = new Uint8Array(len);
  for(let i=0;i<len;i++) bytes[i]=bin.charCodeAt(i);
  return bytes.buffer;
}
function unlockAudio(){
  if(audioReady) return;
  const ctx=ensureCtx();
  if(!ctx) return;
  if(ctx.state==='suspended') ctx.resume();
  // decode the embedded mp3 into a buffer once — no fetch (Chrome blocks fetch on data: URIs)
  const el=document.getElementById('meowAudio');
  if(el && el.src && !meowBuffer){
    try{
      const arr = b64ToArrayBuffer(el.src);
      // decodeAudioData returns a promise in modern Chrome
      const p = ctx.decodeAudioData(arr, decoded=>{meowBuffer=decoded;}, e=>{console.warn('decode failed',e);});
      if(p && p.then){ p.then(decoded=>{meowBuffer=decoded;}).catch(e=>console.warn('decode failed',e)); }
    }catch(e){ console.warn('audio setup failed', e); }
  }
  audioReady=true;
}
// any tap/click anywhere primes audio
document.addEventListener('pointerdown', unlockAudio, {once:false});
document.addEventListener('touchstart', unlockAudio, {once:false});

function beep(ok){
  try{
    const ctx=ensureCtx(); if(!ctx) return;
    if(ctx.state==='suspended') ctx.resume();
    const o=ctx.createOscillator(),g=ctx.createGain();
    o.connect(g);g.connect(ctx.destination);
    if(ok){o.frequency.setValueAtTime(660,ctx.currentTime);o.frequency.exponentialRampToValueAtTime(990,ctx.currentTime+.12);}
    else{o.frequency.setValueAtTime(300,ctx.currentTime);o.frequency.exponentialRampToValueAtTime(160,ctx.currentTime+.18);}
    g.gain.setValueAtTime(.18,ctx.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+.3);
    o.start();o.stop(ctx.currentTime+.3);
  }catch(e){}
}

function meow(){
  const ctx=ensureCtx();
  // if buffer not ready yet, make sure decode is kicked off, then use fallback this once
  if(ctx && !meowBuffer){ unlockAudio(); }
  // preferred path: Web Audio buffer (most reliable on mobile)
  try{
    if(ctx && meowBuffer){
      if(ctx.state==='suspended') ctx.resume();
      const src=ctx.createBufferSource();
      src.buffer=meowBuffer;
      const g=ctx.createGain(); g.gain.value=1.0;
      src.connect(g); g.connect(ctx.destination);
      src.start(0);
      return;
    }
  }catch(e){}
  // fallback: plain <audio> element
  try{
    const a=document.getElementById('meowAudio');
    a.volume=1.0;
    a.currentTime=0;
    const p=a.play();
    if(p&&p.catch)p.catch(()=>{});
  }catch(e){}
}

function confettiBurst(){
  const colors=['#ffc94d','#ff6f91','#3ec9a7','#a06bff','#fff'];
  for(let i=0;i<40;i++){
    const c=document.createElement('div');c.className='confetti';
    c.style.left=Math.random()*100+'%';
    c.style.background=colors[i%colors.length];
    c.style.animationDuration=(1.6+Math.random()*1.6)+'s';
    c.style.animationDelay=(Math.random()*0.4)+'s';
    document.getElementById('app').appendChild(c);
    setTimeout(()=>c.remove(),3600);
  }
}

// ---------- nav ----------
function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));
  document.getElementById(id).classList.add('on');
}
function goHome(){updateHome();show('home');}
function updateHome(){
  document.getElementById('heroImg').src=CAT_IMAGES[0];
  const acc=STORE.totalSeen?Math.round(STORE.totalCorrect/STORE.totalSeen*100):0;
  const lvl=maxFactor();
  document.getElementById('homeStats').innerHTML=
    `<span class="chip">⭐ סבבים: ${STORE.rounds}</span>`+
    `<span class="chip">🎯 דיוק: ${acc}%</span>`+
    `<span class="chip">🔥 שיא רצף: ${STORE.bestStreak}</span>`+
    `<span class="chip">📈 עד ${lvl}×${lvl}</span>`;
}
updateHome();
